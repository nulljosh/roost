<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" style="fill:#0a0a0a;"/>

  <!-- Grid lines (terminal aesthetic) -->
  <line x1="20" y1="0" x2="20" y2="200" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>
  <line x1="100" y1="0" x2="100" y2="200" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>
  <line x1="180" y1="0" x2="180" y2="200" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>
  <line x1="0" y1="20" x2="200" y2="20" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>
  <line x1="0" y1="100" x2="200" y2="100" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>
  <line x1="0" y1="180" x2="200" y2="180" style="stroke:rgba(255,255,255,0.04);stroke-width:1;"/>

  <!-- Pin drop shadow -->
  <ellipse cx="100" cy="158" rx="18" ry="6" style="fill:rgba(0,0,0,0.4);"/>

  <!-- Pin body -->
  <path d="M100 30 C74 30 54 50 54 76 C54 108 100 155 100 155 C100 155 146 108 146 76 C146 50 126 30 100 30Z" style="fill:#003366;stroke:rgba(255,255,255,0.12);stroke-width:1.5;"/>

  <!-- Pin highlight ring -->
  <path d="M100 34 C76 34 58 52 58 76 C58 106 100 150 100 150 C100 150 142 106 142 76 C142 52 124 34 100 34Z" style="fill:none;stroke:rgba(255,255,255,0.07);stroke-width:1;"/>

  <!-- House shape inside pin -->
  <g>
    <!-- Roof -->
    <polygon points="100,52 80,70 120,70" style="fill:#e0e0e0;"/>
    <!-- Wall -->
    <rect x="83" y="70" width="34" height="24" rx="2" style="fill:#e0e0e0;"/>
    <!-- Door -->
    <rect x="93" y="82" width="14" height="12" rx="2" style="fill:#003366;"/>
    <!-- Windows -->
    <rect x="85" y="73" width="8" height="7" rx="1" style="fill:#003366;"/>
    <rect x="107" y="73" width="8" height="7" rx="1" style="fill:#003366;"/>
  </g>

  <!-- Accent dots (terminal cursor motif) -->
  <circle cx="26" cy="26" r="3" style="fill:#003366;opacity:0.7;"/>
  <circle cx="174" cy="26" r="3" style="fill:#003366;opacity:0.7;"/>
  <circle cx="26" cy="174" r="3" style="fill:#003366;opacity:0.7;"/>
  <circle cx="174" cy="174" r="3" style="fill:#003366;opacity:0.7;"/>
</svg>
